{{template "header.html" .}}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
            <div class="text-center mb-8">
                <svg class="w-16 h-16 text-indigo-600 mx-auto mb-4" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="2" y="2" width="28" height="28" rx="6" fill="currentColor"/>
                    <path d="M8 10h16M8 16h12M8 22h8" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
                </svg>
                <h1 class="text-2xl font-bold text-slate-800">{{.config.CustomName}}</h1>
                <p class="text-slate-500 text-sm mt-1">Enter your vault</p>
            </div>
            <form action="/login" method="post">
                <div class="mb-8">
                    <input type="password" name="password" 
                        class="w-full bg-transparent border-0 border-b-2 border-slate-200 px-0 py-3 text-slate-800 text-lg focus:outline-none focus:border-indigo-600 focus:ring-0 transition-colors placeholder-slate-400" 
                        placeholder="密码" required>
                </div>
                <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-all duration-200 active:scale-[0.98] shadow-lg shadow-indigo-500/25">
                    登录
                </button>
            </form>
        </div>
    </div>
</div>
{{template "footer.html" .}}
