{{template "header.html" .}}
<div class="min-h-[calc(100vh-4rem)] flex items-center justify-center px-4">
    <div class="max-w-md w-full">
        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 p-8">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-slate-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                    </svg>
                </div>
                <h1 class="text-2xl font-bold text-slate-800">修改密码</h1>
            </div>
            <form action="/settings/password" method="post" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">原密码</label>
                    <input type="password" name="old_password" 
                        class="w-full bg-slate-100 rounded-xl px-4 py-3 text-slate-800 border-0 focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all placeholder-slate-400" 
                        required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">新密码</label>
                    <input type="password" name="new_password" 
                        class="w-full bg-slate-100 rounded-xl px-4 py-3 text-slate-800 border-0 focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all placeholder-slate-400" 
                        required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">确认新密码</label>
                    <input type="password" name="confirm_password" 
                        class="w-full bg-slate-100 rounded-xl px-4 py-3 text-slate-800 border-0 focus:ring-2 focus:ring-indigo-500/20 focus:bg-white transition-all placeholder-slate-400" 
                        required>
                </div>
                <button type="submit" 
                    class="w-full bg-indigo-600 text-white py-3 rounded-xl font-semibold hover:bg-indigo-700 transition-all duration-200 active:scale-[0.98] shadow-lg shadow-indigo-500/25 mt-6">
                    保存
                </button>
            </form>
        </div>
    </div>
</div>
{{template "footer.html" .}}
